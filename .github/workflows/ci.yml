name: kit-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dogrula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sozdizimi - start.sh
        run: bash -n start.sh

      - name: Smoke-test - kaynak (budanmamis, 10 ajan)
        run: bash claude-starter/eval/smoke-test.sh

      - name: 6 kombinasyon e2e prova (profil x backend-yigini)
        run: |
          set -euo pipefail
          # girdi: ozet-onayi (evet) [+ DevArch onayi (hayir) yalniz dotnet'te]
          combo() {
            local lbl="$1" inp="$2"; shift 2
            local P="$RUNNER_TEMP/proj-$lbl"
            rm -rf "$P"; mkdir -p "$P"
            cp start.sh "$P/"; cp -R claude-starter "$P/"
            ( cd "$P" && printf "$inp" | bash start.sh "$@" >/dev/null )
            ( cd "$P" && bash .claude/eval/smoke-test.sh >/dev/null )
            echo "[$lbl] ajan=$(ls "$P"/.claude/agents/*.md | wc -l | tr -d ' ') skill=$(ls -d "$P"/.claude/skills/*/ | wc -l | tr -d ' ') smoke=OK"
          }
          combo frontend         'evet\n'        --frontend
          combo mobile           'evet\n'        --mobile
          combo backend-dotnet   'evet\nhayir\n' --backend --dotnet
          combo backend-generic  'evet\n'        --backend --generic
          combo fullstack-dotnet 'evet\nhayir\n' --fullstack --dotnet
          combo fullstack-generic 'evet\n'       --fullstack --generic
