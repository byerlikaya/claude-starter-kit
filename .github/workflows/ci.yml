name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax — shell scripts
        run: |
          set -euo pipefail
          bash -n start.sh
          bash -n adopt.sh
          for s in claude-starter/hooks/*.sh claude-starter/eval/*.sh packaging/*.sh; do
            [ -f "$s" ] && bash -n "$s" && echo "ok: $s"
          done

      - name: Smoke test — source (unpruned, 11 agents)
        run: bash claude-starter/eval/smoke-test.sh

      - name: Routing eval — behavioral (golden routing + agent conflicts)
        run: bash claude-starter/eval/routing-eval.sh

      - name: README skill catalogue in sync with the skills
        run: bash packaging/build-readme-catalog.sh --check

      - name: e2e rehearsal — start.sh (6 combos) + adopt.sh (stack detection · overlap · refresh)
        run: bash packaging/e2e.sh
