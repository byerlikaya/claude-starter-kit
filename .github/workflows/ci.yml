name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Syntax — shell scripts
        run: |
          set -euo pipefail
          bash -n start.sh
          bash -n adopt.sh
          for s in claude-starter/hooks/*.sh claude-starter/eval/*.sh packaging/*.sh; do
            [ -f "$s" ] && bash -n "$s" && echo "ok: $s"
          done

      - name: Smoke test — source (unpruned, 11 agents)
        run: bash claude-starter/eval/smoke-test.sh

      - name: Routing eval — behavioral (golden routing + agent conflicts)
        run: bash claude-starter/eval/routing-eval.sh

      - name: README skill catalogue in sync with the skills
        run: bash packaging/build-readme-catalog.sh --check

      - name: Plugin & marketplace manifests valid (strict)
        # Offline manifest validation via the official CLI; --strict fails on unrecognized fields / missing
        # metadata. No API auth needed (this does not call the model). CI=true keeps it non-interactive.
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate plugin --strict
          claude plugin validate .claude-plugin/marketplace.json --strict

      - name: e2e rehearsal — start.sh (6 combos) + adopt.sh (stack detection · overlap · refresh)
        run: bash packaging/e2e.sh

  # Cross-platform proof: the installer and the non-interactive settings SELF-HEAL must behave the same on Windows
  # (Git-Bash) and macOS, not only Linux — Windows especially, since that is where the update was failing. Runs the
  # OS-sensitive checks (syntax · smoke · e2e); the Linux job above owns the manifest/catalogue checks.
  verify-cross:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Syntax — shell scripts
        run: |
          set -euo pipefail
          bash -n start.sh
          bash -n adopt.sh
          for s in claude-starter/hooks/*.sh claude-starter/eval/*.sh packaging/*.sh; do
            [ -f "$s" ] && bash -n "$s" && echo "ok: $s"
          done

      - name: Smoke test
        run: bash claude-starter/eval/smoke-test.sh

      - name: e2e rehearsal — installer + non-interactive self-heal (with/without jq·python)
        run: bash packaging/e2e.sh
