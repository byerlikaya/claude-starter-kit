# Which agents/skills a profile prunes. SINGLE SOURCE OF TRUTH — read by both start.sh (install) and
# adopt.sh (update), so a refresh reshapes a project exactly the way its original install did. Keeping this
# mapping in two scripts would let them drift; drift is what silently broke the CLAUDE.md split marker once.
#
# Format, colon-separated, three fields:
#   <profile>:<excluded agent filenames>:<excluded skill directory names>
#
# 'fullstack' prunes nothing — it installs every agent and every skill, backend + web + mobile (RN/Expo).
# The non-.NET ("generic") backend additionally drops devarch-module. That rule is driven by the stack, not
# the profile, so it lives in the scripts rather than here.
backend:frontend-expert-csk.md:frontend frontend-rn-expo a11y
frontend:backend-expert-csk.md database-expert-csk.md:db-migration devarch-module frontend-rn-expo api-design
mobile:backend-expert-csk.md database-expert-csk.md:db-migration devarch-module api-design
fullstack::
